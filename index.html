<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> ATC </title>
<style>
/* 🌍 الأساسيات */
body {
  font-family: "Segoe UI", Tahoma, Arial, sans-serif;
  background: #140505;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* 📦 الصندوق الرئيسي */
.container {
  width: 80%;
  max-width: 600px;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  position: relative;
  z-index: 2;
  max-height: 80vh;
  overflow-y: auto;
  margin-top: 180px;
}

/* 📝 العناوين */
h1, h2 {
  text-align: center;
  color: #B3000F;
  margin-bottom: 20px;
  font-size: 1.5rem;
}

/* 🔘 الأزرار */
button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  font-size: 1rem;
  font-weight: bold;
  background: linear-gradient(145deg, #9e020f, #460107);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.25s ease-in-out;
}
button:hover {
  background: linear-gradient(145deg, #7A000B, #4D0006);
  transform: translateY(-6px);
  box-shadow: 0 4px 8px rgba(179,0,15,0.4);
}

/* ⬅ زر الرجوع */
.back-btn {
  background: linear-gradient(145deg, #555, #272727);
}
.back-btn:hover {
  background: linear-gradient(145deg, #333, #111);
}

/* 🔑 حقل الإدخال */
input[type="password"] {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
  box-sizing: border-box;
}

/* 📑 iframe */
iframe {
  width: 100%;
  height: 60vh;
  border: none;
  border-radius: 8px;
}

/* 🌐 أزرار اختيار اللغة */
.lang-switch {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 1000;
}
.lang-switch button {
  width: auto;
  display: inline-block;
  padding: 6px 12px;
  margin: 2px;
  font-size: 0.9rem;
  background: #333;
  border-radius: 6px;
}
.lang-switch button:hover {
  background: #111;
}

/* 🔺 الشعار أعلى يمين */
.top-right-logo {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 130px;
  height: auto;
  z-index: 1100;
}

/* 🎲 المكعب */
.animation-container {
  position: absolute;
  top: 15%;
  left: 50%;
  transform: translate(-50%, -50%);
  perspective: 900px;
  z-index: 1;
}
.cube {
  position: relative;
  width: 100px;
  height: 100px;
  transform-style: preserve-3d;
  animation: cubeRotate 11s infinite linear;
}
.cube-face {
  position: absolute;
  width: 200px;
  height: 200px;
  background: rgba(37, 4, 7, 0.85);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 1.1rem;
  border: 2px solid #fff;
  text-align: center;
}
.front  { transform: rotateY(0deg) translateZ(100px); }
.back   { transform: rotateY(180deg) translateZ(100px); }
.right  { transform: rotateY(90deg) translateZ(100px); }
.left   { transform: rotateY(-90deg) translateZ(100px); }
.top    { transform: rotateX(90deg) translateZ(100px); }
.bottom { transform: rotateX(-90deg) translateZ(100px); }

@keyframes cubeRotate {
  from { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
  to   { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
}

/* 🔻 شعار ميتسوبيشي */
.mitsu {
  position: relative;
  width: 60px;
  height: 60px;
  transform: rotate(180deg) translateY(-20px);
}
.rhombus {
  position: absolute;
  top: 50%; 
  left: 50%;
  width: 0; 
  height: 0;
  border: 15px solid transparent;
  border-bottom: 30px solid #e60012;
  transform-origin: center;
}
.rhombus:after {
  content: "";
  position: absolute;
  left: -15px;
  top: 30px;
  width: 0; 
  height: 0;
  border: 15px solid transparent;
  border-top: 30px solid #e60012;
}
.top-rhombus    { transform: translate(-50%, -50%) rotate(0deg); }
.left-rhombus   { transform: translate(-50%, -50%) rotate(-120deg); }
.right-rhombus  { transform: translate(-50%, -50%) rotate(120deg); }

.fuso-text {
  font-size: 1.6rem;
  font-weight: 900;
  margin-top: 8px;
  letter-spacing: 2px;
  color: white;
  background: #e60012;
  padding: 3px 8px;
  border-radius: 4px;
}

/* 📱 تصميم خاص للجوال */
@media (max-width: 600px) {
  h1, h2 { font-size: 1.1rem; }

  .container {
    width: 90%;
    max-width: 420px;
    margin-top: 180px;
    height: auto;
    min-height: 180px;
  }

  .animation-container { top: 22%; }

  .cube { width: 140px; height: 140px; }
  .cube-face { width: 140px; height: 140px; font-size: 0.9rem; }
  .front  { transform: rotateY(0deg) translateZ(70px); }
  .back   { transform: rotateY(180deg) translateZ(70px); }
  .right  { transform: rotateY(90deg) translateZ(70px); }
  .left   { transform: rotateY(-90deg) translateZ(70px); }
  .top    { transform: rotateX(90deg) translateZ(70px); }
  .bottom { transform: rotateX(-90deg) translateZ(70px); }

  .mitsu { width: 50px; height: 50px; }
  .rhombus { border: 14px solid transparent; border-bottom: 28px solid #e60012; }
  .rhombus:after { left: -14px; top: 28px; border: 14px solid transparent; border-top: 28px solid #e60012; }

  .fuso-text { font-size: 1.1rem; padding: 4px 8px; }
}

/* 💻 تصميم خاص للكمبيوتر */
@media (min-width: 1025px) {
  .container { 
    width: 70%; 
    max-width: 1000px; 
    margin-top: 100px; 
    max-height: 80vh; 
  }

  .cube { width: 200px; height: 200px; }
  .cube-face { font-size: 1.4rem; }
  .fuso-text { font-size: 2rem; padding: 6px 12px; }

  .top-right-logo { width: 250px; }

  .lang-switch button {
    font-size: 1.2rem;
    padding: 8px 18px;
    margin: 4px;
  }
}
</style>
</head>
<body>
<img src="Picture1.png" alt="شعاري" class="top-right-logo">

<div class="lang-switch">
  <button onclick="setLanguage('ar')">العربية</button>
  <button onclick="setLanguage('en')">English</button>
</div>

<div class="animation-container">
  <div class="cube">
    <div class="cube-face front">Determination<div class="mitsu"><div class="rhombus top-rhombus"></div><div class="rhombus left-rhombus"></div><div class="rhombus right-rhombus"></div></div></div>
    <div class="cube-face back">Hard Work<div class="fuso-text">FUSO</div></div>
    <div class="cube-face right">Creativity<div class="mitsu"><div class="rhombus top-rhombus"></div><div class="rhombus left-rhombus"></div><div class="rhombus right-rhombus"></div></div></div>
    <div class="cube-face left">Growth<div class="fuso-text">FUSO</div></div>
    <div class="cube-face top">Success<div class="mitsu"><div class="rhombus top-rhombus"></div><div class="rhombus left-rhombus"></div><div class="rhombus right-rhombus"></div></div></div>
    <div class="cube-face bottom">Excellence<div class="fuso-text">FUSO</div></div>
  </div>
</div>

<div class="container" id="app"></div>

<script>
var lang = localStorage.getItem('quizLang') || 'ar'; 
var selectedQuiz = null;
var inTestPage = false; 
var selectedSubQuiz = null;

function setLanguage(selectedLang) {
    lang = selectedLang;
    localStorage.setItem('quizLang', lang);
    showQuizTypeSelection();
}

function showQuizTypeSelection() {
    selectedQuiz = null; 
    inTestPage = false;
    var title = lang === 'ar' ? "اختر نوع الدورة" : "Choose Course Type";
    document.getElementById('app').innerHTML =
        '<h2>' + title + '</h2>' +
        '<button onclick="selectedQuiz=\'serviceadvisor\';showCourseOptions()">🛎 ' + (lang === 'ar' ? 'مستشار الصيانة' : 'Service Advisor') + '</button>' +
        '<button onclick="selectedQuiz=\'salesmarketing\';showCourseOptions()">💼 ' + (lang === 'ar' ? 'المبيعات والتسويق' : 'Sales & Marketing') + '</button>';
}

/* ⚙️ Process And System */
function showProcessPassword() {
  document.getElementById('app').innerHTML =
    '<h2>' +
    (lang === 'ar'
      ? 'أدخل كلمة المرور لـ Process And System'
      : 'Enter password for Process And System') +
    '</h2>' +

    '<input type="password" id="processPass" placeholder="' +
    (lang === 'ar' ? 'كلمة المرور' : 'Password') + '">' +
 
    '<button onclick="checkProcessPass()">' +
    (lang === 'ar' ? 'تأكيد' : 'Confirm') +
    '</button>' +

    '<button class="back-btn" onclick="showSAQuizzesRoot()">' +
    (lang === 'ar' ? 'رجوع' : 'Back') +
    '</button>';
}

function checkProcessPass() {
  var pass = document.getElementById('processPass').value.trim();
  if (pass === '5055') {
    openProcessForm();
  } else {
    alert(lang === 'ar' ? 'كلمة المرور خاطئة!' : 'Incorrect password!');
  }
}

function openProcessForm() {
  var url =
    'https://docs.google.com/forms/d/e/1FAIpQLSfkff354e2uZoK2S5ybRyMjHSRnFc3q-IilTGpvEsh1vkCe6A/viewform?usp=dialog';

  document.getElementById('app').innerHTML =
    '<h2>⚙️ Process And System</h2>' +
    '<iframe src="' + url + '?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>' +
    '<button class="back-btn" onclick="showSAQuizzesRoot()">' +
    (lang === 'ar' ? 'رجوع' : 'Back') +
    '</button>';
}


function showCourseOptions() {
    inTestPage = false;
    var title = lang === 'ar' ? "محتويات الدورة" : "Course Contents";
    document.getElementById('app').innerHTML =
        '<h2>' + title + '</h2>' +
        '<button onclick="showVideos()">🎬 ' + (lang === 'ar' ? 'المقاطع التعليمية' : 'Video Lessons') + '</button>' +
        '<button onclick="showGame()">🎮 ' + (lang === 'ar' ? 'تمثيل دور' : ' Role playing') + '</button>' +
        '<button onclick="showContent()">📘 ' + (lang === 'ar' ? 'المادة التدريبية' : 'Course Material') + '</button>' +
        '<button onclick="showSAQuizzesRoot()">📝 ' + (lang === 'ar' ? 'الاختبارات' : 'Quizzes') + '</button>' +
        '<button onclick="showEvaluation()">⭐ ' + (lang === 'ar' ? 'تقييم الدورة' : 'Course Evaluation') + '</button>' +
        '<button class="back-btn" onclick="showQuizTypeSelection()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

/* ✅ تقسيم جديد للاختبارات */
function showSAQuizzesRoot() {
  if (selectedQuiz === 'salesmarketing') {
    // اختبارات المبيعات والتسويق
    document.getElementById('app').innerHTML =
      '<h2>' + (lang === 'ar' ? 'الاختبارات - المبيعات والتسويق' : 'Quizzes - Sales & Marketing') + '</h2>' +
      '<button onclick="showSalesMarketingQuizzes()">🎧 Yamaha audio system & Outlander differences</button>' +
      '<button class="back-btn" onclick="showCourseOptions()">' +
      (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
  } else {
    // اختبارات مستشار الصيانة
    document.getElementById('app').innerHTML =
      '<h2>' + (lang === 'ar' ? 'الاختبارات' : 'Quizzes') + '</h2>' +

      '<button onclick="showProcessPassword()">⚙️ Process And System</button>' +

      '<button onclick="showSAQuizzes()">💡 Customer Care Skills</button>' +

      '<button onclick="showCertificationPassword()">📜 Certification Level_1</button>' +

      '<button class="back-btn" onclick="showCourseOptions()">' +
      (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
  }
}


/* ✅ كلمة المرور لـ Certification Level_1 */
function showCertificationPassword() {
  document.getElementById('app').innerHTML =
    '<h2>' + (lang === 'ar' ? 'أدخل كلمة المرور لـ Certification Level_1' : 'Enter password for Certification Level_1') + '</h2>' +
    '<input type="password" id="certPass" placeholder="' + (lang === 'ar' ? 'كلمة المرور' : 'Password') + '" />' +
    '<button onclick="checkCertificationPass()">' + (lang === 'ar' ? 'تأكيد' : 'Confirm') + '</button>' +
    '<button class="back-btn" onclick="showSAQuizzesRoot()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

function checkCertificationPass() {
  var pass = document.getElementById("certPass").value.trim();
  if (pass === "ATC") {
    openCertificationLevel1();
  } else {
    alert(lang === "ar" ? "كلمة المرور خاطئة!" : "Incorrect password!");               
  }
}   

/* ✅ صفحة Certification Level_1 */
function openCertificationLevel1() {     
  var url = "https://docs.google.com/forms/d/e/1FAIpQLSf-MgYlNMACCBak-U2V7_e8fhtkyDzQukLe1k-LM1nExC827A/viewform?usp=dialog";
  document.getElementById('app').innerHTML =
    '<h2>📜 Certification Level 1</h2>' +
    '<iframe src="' + url + '?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>' +
    '<button class="back-btn" onclick="showSAQuizzesRoot()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}



/* ✅ صفحة Customer Care Skills */
function showSAQuizzes() {
  document.getElementById('app').innerHTML =
    '<h2>' + (lang === 'ar' ? 'Customer Care Skills' : 'Customer Care Skills') + '</h2>' +
    '<button onclick="openSATest()">🧩 Test</button>' + 
    '<button onclick="showPasswordInputSA(1)">📘 Quiz 1: Customer Delight</button>' +
    '<button onclick="showPasswordInputSA(2)">📘 Quiz 2: SA Roles & Responsibilities</button>' +
    '<button onclick="showPasswordInputSA(3)">📘 Quiz 3: Customer Satisfaction</button>' +
    '<button onclick="showPasswordInputSA(4)">📘 Quiz 4: Customer Care Skills</button>' +
    '<button onclick="showPasswordInputSA(5)">📘 Final Quiz</button>' +
    '<button class="back-btn" onclick="showSAQuizzesRoot()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

function openSATest() {
  var url = "https://docs.google.com/forms/d/e/1FAIpQLSfcSHvHZecOUbQrOMvfmgCEcdTh9s9q4f9X0NfaMZhtTJms6w/viewform?usp=dialog";
  document.getElementById('app').innerHTML =
    '<h2>🧩 Test</h2>' +
    '<iframe src="' + url + '?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>' +
    '<button class="back-btn" onclick="showSAQuizzes()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

function showPasswordInputSA(num) {
  selectedSubQuiz = num;
  var txt = '';
  if (num === 1) txt = 'Quiz 1: Customer Delight';
  if (num === 2) txt = 'Quiz 2: SA Roles & Responsibilities';
  if (num === 3) txt = 'Quiz 3: Customer Satisfaction';
  if (num === 4) txt = 'Quiz 4: Customer Care Skills';
  if (num === 5) txt = 'Final Quiz';
  document.getElementById('app').innerHTML =
    '<h2>' + (lang === 'ar' ? 'ادخل كلمة المرور لـ ' : 'Enter Password for ') + txt + '</h2>' +
    '<input type="password" id="passwordInput" placeholder="' + (lang === 'ar' ? 'كلمة المرور' : 'Password') + '" />' +
    '<button onclick="checkPasswordSA()">' + (lang === 'ar' ? 'تأكيد' : 'Confirm') + '</button>' +
    '<button class="back-btn" onclick="showSAQuizzes()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

function checkPasswordSA() {
  var enteredPassword = document.getElementById('passwordInput').value.trim();
  var correct = '';
  if (selectedSubQuiz === 1) correct = '3';
  if (selectedSubQuiz === 2) correct = '6';
  if (selectedSubQuiz === 3) correct = '9';
  if (selectedSubQuiz === 4) correct = '0';
  if (selectedSubQuiz === 5) correct = '3690';

  if (enteredPassword === correct) {
    showSAQuizForm(selectedSubQuiz);
  } else {
    alert(lang === 'ar' ? 'كلمة مرور خاطئة!' : 'Incorrect password!');
  }
}

function showSAQuizForm(num) {
  var url = "";
  if (num === 1) url = "https://docs.google.com/forms/d/e/1FAIpQLScJLJnpZiKQxs37TJHzGaLm6Mbg-MfeWtkcfk0CMysOwHw4vA/viewform?usp=sharing&ouid=117356683965445434657";
  if (num === 2) url = "https://docs.google.com/forms/d/e/1FAIpQLSfpGWyNOcJdXm-9CjdnTKy6mY3lfeVsc5z36PmOH0zDchZ8OA/viewform?usp=dialog";
  if (num === 3) url = "https://docs.google.com/forms/d/e/1FAIpQLSdxKLyTPZmm0ckDQNp81k8ieYlyVS_HVguQNI_dLRnjd3CkTg/viewform?usp=dialog";
  if (num === 4) url = "https://docs.google.com/forms/d/e/1FAIpQLScZy-v6lc3kElM11OpTNaka5Q9xVXitL2wsWkUbFZxwJOhKyw/viewform?usp=dialog";
  if (num === 5) url = "https://docs.google.com/forms/d/e/1FAIpQLSea7mUP3auJQsIx-I12oqxr5FBQ8ggF50xARMSE8TnC9CD_mQ/viewform?usp=dialog";

  document.getElementById('app').innerHTML =
    '<h2>' + (lang === 'ar' ? 'نموذج الاختبار' : 'Quiz Form') + '</h2>' +
    '<iframe src="' + url + '?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>' +
    '<button class="back-btn" onclick="showSAQuizzes()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

function showVideos() {
    if (selectedQuiz === "serviceadvisor") {
        document.getElementById('app').innerHTML =
            '<h2>' + (lang === 'ar' ? 'المقاطع التعليمية' : 'Video Lessons') + '</h2>' +
            '<button onclick="window.open(\'https://360.articulate.com/review/content/99038e9a-83f7-44f0-a54b-d734bd6488e7/review\', \'_blank\')">' +
            (lang === 'ar' ? ' Customer Delight ' : 'Customer Delight') + '</button>' +
            '<button onclick="openPilotTest()">' +
            (lang === 'ar' ? 'الاختبار التجريبي بعد مشاهدة الفيديو' : 'Pilot test after watching the video') + '</button>' +
            '<button class="back-btn" onclick="showCourseOptions()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
    } else {
        var driveVideoLink = "https://drive.google.com/file/d/1-DAK4Nt8hF5sqtKn6E76Hg2-svx6Fhe5/view?usp=sharing";
        document.getElementById('app').innerHTML =
            '<h2>' + (lang === 'ar' ? 'المقاطع التعليمية' : 'Video Lessons') + '</h2>' +
            '<p>' + (lang === 'ar' ? 'سيتم إدراج الفيديوهات هنا.' : 'Videos will be shown here.') + '</p>' +
            '<button onclick="window.open(\'' + driveVideoLink + '\', \'_blank\')">📁 Drivepass</button>' + 
            '<button class="back-btn" onclick="showCourseOptions()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
    }
}

function openPilotTest() {
  var formURL =
    lang === 'ar'
      ? "https://docs.google.com/forms/d/e/1FAIpQLScnFWFTdGMQHu6vs5tUWjGjZpYC0umkAfS6cK5Uvxm4o4daEg/viewform?embedded=true"
      : "https://docs.google.com/forms/d/e/1FAIpQLSdoD_e5LYB_ctOlWk4SkxxvR6A_h5RFj5_VPHCEOCrw-xMW-Q/viewform?embedded=true";

  document.getElementById('app').innerHTML =
    '<h2>' + (lang === 'ar' ? 'الاختبار التجريبي' : 'Pilot Test') + '</h2>' +
    '<iframe src="' + formURL + '" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>' +
    '<button class="back-btn" onclick="showVideos()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

function showGame() {
    document.getElementById('app').innerHTML =
        '<h2>' + (lang === 'ar' ? 'اللعبة التدريبية' : 'Training Game') + '</h2>' +
        '<p>' + (lang === 'ar' ? 'محاكاة تفاعلية لتجربة المهام.' : 'Interactive simulation game.') + '</p>' +
        '<button class="back-btn" onclick="showCourseOptions()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

function showContent() {
    if (selectedQuiz === "serviceadvisor") {
        var driveFileURL1 = "https://drive.google.com/file/d/1JNK2KjCgx1WbhTiabAaTnk6vH0Taz5aF/view?usp=sharing";
        var driveFileURL2 = "https://drive.google.com/file/d/1U-IYCOsEiSGEXcNial5_Cwy7GyfgqZTk/view?usp=sharing";
        var driveFileURL3 = "https://drive.google.com/file/d/1P3dDxDBja2B22BWKcu4CBbbNdMqp-RCk/view?usp=sharing";
        document.getElementById('app').innerHTML =
            '<h2>' + (lang === 'ar' ? 'المادة التدريبية' : 'Course Material') + '</h2>' +
            '<p>' + (lang === 'ar' ? 'اضغط على الزر أدناه لعرض الملفات:' : 'Click the buttons below to open the files:') + '</p>' +
            '<button onclick="window.open(\'' + driveFileURL3 + '\', \'_blank\')">📘 Customer Delight L1p2</button>' +
            '<button onclick="window.open(\'' + driveFileURL1 + '\', \'_blank\')">📄 Customer Care Skills </button>' +
            '<button onclick="window.open(\'' + driveFileURL2 + '\', \'_blank\')">📘 Service Advisor Guid book </button>' +
            '<button class="back-btn" onclick="showCourseOptions()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
    } else {
        var driveFileSales = "https://drive.google.com/file/d/1BkWrCUDOTzg15LP_Jh-0JMOFRwnfDQbz/view?usp=sharing";
        document.getElementById('app').innerHTML =
            '<h2>' + (lang === 'ar' ? 'المادة التدريبية' : 'Course Material') + '</h2>' +
            '<p>' + (lang === 'ar' ? 'سيتم إدراج ملفات ومواد الدورة هنا.' : 'Training materials will be added here.') + '</p>' +
            '<button onclick="window.open(\'' + driveFileSales + '\', \'_blank\')">📁 Drivepass</button>' + 
            '<button class="back-btn" onclick="showCourseOptions()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
    }
}

function showEvaluation() {
    inTestPage = false;
    var evaluationURL = "https://forms.gle/SoroUemofhoK96uP6";
    document.getElementById('app').innerHTML =
        '<h2>' + (lang === 'ar' ? 'تقييم الدورة' : 'Course Evaluation') + '</h2>' +
        '<iframe src="' + evaluationURL + '?embedded=true" width="100%" height="600" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>' +
        '<button class="back-btn" onclick="showCourseOptions()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden' && inTestPage) {
        alert(lang === 'ar' ? 'لقد غادرت صفحة الاختبار. سيتم إعادتك إلى الصفحة الأولى.' : 'You have left the quiz page. You will be redirected to the first page.');
        showQuizTypeSelection(); 
        inTestPage = false; 
    }
});

/* ==== قسم المبيعات والتسويق: كلمة مرور وفتح الاختبار ==== */

// شاشة اختيار اختبار واحد لقسم المبيعات والتسويق
function showSalesMarketingQuizzes() {
  document.getElementById('app').innerHTML =
    '<h2>' + (lang === 'ar' ? 'Yamaha audio system & Outlander differences' : 'Yamaha audio system & Outlander differences') + '</h2>' +
    '<button onclick="showSalesMarketingPassword()">' +
    (lang === 'ar' ? 'فتح الاختبار' : 'Open Quiz') + '</button>' +
    '<button class="back-btn" onclick="showSAQuizzesRoot()">' +
    (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

// صفحة كلمة المرور للاختبار
function showSalesMarketingPassword() {
  document.getElementById('app').innerHTML =
    '<h2>' + (lang === 'ar' ? 'أدخل كلمة المرور' : 'Enter Password') + '</h2>' +
    '<input type="password" id="salesMktPass" placeholder="' + (lang === 'ar' ? 'كلمة المرور' : 'Password') + '" />' +
    '<button onclick="checkSalesMarketingPass()">' + (lang === 'ar' ? 'تأكيد' : 'Confirm') + '</button>' +
    '<button class="back-btn" onclick="showSalesMarketingQuizzes()">' + (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

// التحقق من كلمة المرور ثم فتح النموذج داخل iframe
function checkSalesMarketingPass() {
  var pass = document.getElementById('salesMktPass').value.trim();
  if (pass === 'ATC') {
    openSalesMarketingQuiz();
  } else {
    alert(lang === 'ar' ? 'كلمة المرور خاطئة!' : 'Incorrect password!');
  }
}

function openSalesMarketingQuiz() {
  var url = 'https://docs.google.com/forms/d/e/1FAIpQLSdHVQbqbCyRlrg0XGQ5S6O5mPwwybOxasiT-lFXItBSMZxAtA/viewform?usp=publish-editor';
  document.getElementById('app').innerHTML =
    '<h2>🎧 Yamaha audio system & Outlander differences</h2>' +
    '<iframe src="' + url + '?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>' +
    '<button class="back-btn" onclick="showSalesMarketingQuizzes()">' +
    (lang === 'ar' ? 'رجوع' : 'Back') + '</button>';
}

showQuizTypeSelection();
</script>
